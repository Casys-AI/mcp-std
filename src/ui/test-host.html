<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCP Apps Test Host</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid #0f3460;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 500;
    }

    .header .status {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      background: #0f3460;
    }

    .header .status.connected {
      background: #1b4332;
      color: #95d5b2;
    }

    .controls {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    .controls label {
      font-size: 13px;
      color: #aaa;
    }

    .controls input, .controls select {
      background: #0f3460;
      border: 1px solid #1a1a2e;
      color: #eee;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
    }

    .controls input:focus, .controls select:focus {
      outline: none;
      border-color: #e94560;
    }

    .controls button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .controls button:hover {
      background: #ff6b6b;
    }

    .controls button:disabled {
      background: #444;
      cursor: not-allowed;
    }

    .main {
      flex: 1;
      display: flex;
      gap: 0;
    }

    .ui-container {
      flex: 1;
      background: white;
      position: relative;
    }

    .ui-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .sidebar {
      width: 350px;
      background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }

    .sidebar h3 {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      border-bottom: 1px solid #0f3460;
    }

    .log {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
    }

    .log-entry {
      padding: 6px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      background: #0f3460;
      word-break: break-all;
    }

    .log-entry.incoming {
      border-left: 3px solid #4ecdc4;
    }

    .log-entry.outgoing {
      border-left: 3px solid #e94560;
    }

    .log-entry .label {
      font-size: 10px;
      color: #888;
      margin-bottom: 4px;
    }

    .log-entry pre {
      white-space: pre-wrap;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MCP Apps Test Host</h1>
    <span class="status" id="status">Disconnected</span>
  </div>

  <div class="controls">
    <label>Data Source:</label>
    <select id="dataSource">
      <option value="sample">Sample Data (3 rows)</option>
      <option value="large">Large Dataset (100 rows)</option>
      <option value="live">Live Query (PostgreSQL)</option>
    </select>

    <input type="text" id="query" placeholder="SQL query (for live mode)" style="width: 300px;" value="SELECT table_name, pg_total_relation_size(quote_ident(table_name)) as size FROM information_schema.tables WHERE table_schema = 'public' ORDER BY size DESC LIMIT 20">

    <button id="sendData">Send Data to UI</button>
    <button id="reload">Reload UI</button>
  </div>

  <div class="main">
    <div class="ui-container">
      <iframe id="uiFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div class="sidebar">
      <h3>Message Log</h3>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    const iframe = document.getElementById('uiFrame');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');
    const dataSourceEl = document.getElementById('dataSource');
    const queryEl = document.getElementById('query');
    const sendBtn = document.getElementById('sendData');
    const reloadBtn = document.getElementById('reload');

    let messageId = 1;

    // MCP Server URL
    const MCP_SERVER = 'http://localhost:3008';

    // Load UI from MCP server resources/read
    async function loadUiFromMcp() {
      try {
        const response = await fetch(MCP_SERVER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: 'resources/read',
            params: { uri: 'ui://mcp-std/table-viewer' }
          })
        });

        const result = await response.json();
        if (result.error) {
          throw new Error(result.error.message);
        }

        // Get HTML from response
        const content = result.result.contents?.[0];
        if (content?.text) {
          // Use srcdoc to inject HTML into iframe
          iframe.srcdoc = content.text;
          log('info', `Loaded UI from MCP server (${content.text.length} bytes)`);
        } else {
          throw new Error('No HTML content in response');
        }
      } catch (e) {
        log('error', `Failed to load UI: ${e.message}`);
        iframe.srcdoc = `<html><body style="color: #ff6b6b; padding: 20px;">
          <h3>Failed to load UI</h3>
          <p>${e.message}</p>
          <p>Make sure mcp-std server is running: <code>cd lib/std && deno task serve</code></p>
        </body></html>`;
      }
    }

    // Load UI on start
    loadUiFromMcp();

    // Sample data - array of objects (table-viewer extracts columns automatically)
    const sampleData = [
      { id: 1, name: "Alice", email: "alice@example.com", role: "Admin", created_at: "2024-01-15" },
      { id: 2, name: "Bob", email: "bob@example.com", role: "User", created_at: "2024-02-20" },
      { id: 3, name: "Charlie", email: "charlie@example.com", role: "User", created_at: "2024-03-10" },
    ];

    // Large dataset generator - returns array of objects
    function generateLargeData() {
      const roles = ["Admin", "User", "Editor", "Viewer"];
      const rows = [];
      for (let i = 1; i <= 100; i++) {
        rows.push({
          id: i,
          name: `User ${i}`,
          email: `user${i}@example.com`,
          role: roles[Math.floor(Math.random() * roles.length)],
          score: Math.floor(Math.random() * 1000),
          active: Math.random() > 0.3,
          created_at: new Date(Date.now() - Math.random() * 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
        });
      }
      return rows;
    }

    // Fetch live data from MCP server
    async function fetchLiveData(query) {
      try {
        const response = await fetch('http://localhost:3008', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            jsonrpc: '2.0',
            id: 1,
            method: 'tools/call',
            params: {
              name: 'psql_query',
              arguments: {
                url: 'postgres://casys:Kx9mP2vL7nQ4wRzT@localhost:5432/casys',
                query: query
              }
            }
          })
        });

        const result = await response.json();
        if (result.error) {
          throw new Error(result.error.message);
        }

        const text = result.result.content[0].text;
        return JSON.parse(text);
      } catch (e) {
        log('error', `Failed to fetch: ${e.message}`);
        return null;
      }
    }

    // Log helper
    function log(direction, data) {
      const entry = document.createElement('div');
      entry.className = `log-entry ${direction}`;
      entry.innerHTML = `
        <div class="label">${direction === 'incoming' ? '← FROM UI' : direction === 'outgoing' ? '→ TO UI' : '⚠ ' + direction.toUpperCase()}</div>
        <pre>${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}</pre>
      `;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Handle messages from UI
    window.addEventListener('message', (e) => {
      // Ignore messages from other sources
      if (e.source !== iframe.contentWindow) return;

      const msg = e.data;
      log('incoming', msg);

      // Handle MCP Apps protocol
      if (msg.jsonrpc === '2.0') {
        handleJsonRpc(msg);
      }
    });

    // Handle JSON-RPC messages from UI
    function handleJsonRpc(msg) {
      const { id, method, params } = msg;

      if (method === 'ui/initialize') {
        // Respond to initialize per MCP Apps spec
        // See: https://github.com/modelcontextprotocol/ext-apps
        const response = {
          jsonrpc: '2.0',
          id,
          result: {
            protocolVersion: '2026-01-26',
            hostInfo: {
              name: 'MCP Apps Test Host',
              version: '1.0.0'
            },
            hostCapabilities: {
              openLinks: {},
              logging: {},
              updateModelContext: { text: {} },
              message: { text: {} }
            },
            hostContext: {
              theme: 'light',
              displayMode: 'inline'
            }
          }
        };

        iframe.contentWindow.postMessage(response, '*');
        log('outgoing', response);

        statusEl.textContent = 'Connected';
        statusEl.classList.add('connected');
      }

      if (method === 'ui/updateModelContext') {
        // Acknowledge model context update
        const response = { jsonrpc: '2.0', id, result: {} };
        iframe.contentWindow.postMessage(response, '*');
        log('outgoing', response);
      }

      if (method === 'tools/call') {
        // UI is calling a tool - we could route this to MCP server
        log('info', `UI called tool: ${params?.name}`);
      }
    }

    // Send tool result to UI
    // Format according to MCP Apps spec: https://github.com/modelcontextprotocol/ext-apps
    // Method: ui/notifications/tool-result with params: CallToolResult
    function sendToolResult(data) {
      const toolResult = {
        jsonrpc: '2.0',
        method: 'ui/notifications/tool-result',
        params: {
          content: [{
            type: 'text',
            text: JSON.stringify(data, null, 2)
          }],
          isError: false
        }
      };

      iframe.contentWindow.postMessage(toolResult, '*');
      log('outgoing', toolResult);
    }

    // Button handlers
    sendBtn.addEventListener('click', async () => {
      sendBtn.disabled = true;
      sendBtn.textContent = 'Loading...';

      try {
        let data;
        const source = dataSourceEl.value;

        if (source === 'sample') {
          data = sampleData;
        } else if (source === 'large') {
          data = generateLargeData();
        } else if (source === 'live') {
          data = await fetchLiveData(queryEl.value);
          if (!data) return;
        }

        sendToolResult(data);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Data to UI';
      }
    });

    reloadBtn.addEventListener('click', () => {
      statusEl.textContent = 'Disconnected';
      statusEl.classList.remove('connected');
      logEl.innerHTML = '';
      loadUiFromMcp();
    });

    // Show/hide query input based on data source
    dataSourceEl.addEventListener('change', () => {
      queryEl.style.display = dataSourceEl.value === 'live' ? 'block' : 'none';
    });
    queryEl.style.display = 'none';
  </script>
</body>
</html>
